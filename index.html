<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulasi Depresiasi Mobil</title>
    
    <!-- Tailored Tailwind CSS Browser CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
            }
          }
        }
      }
    </script>
    
    <!-- Google Web Fonts: Elegant Modern Inter Typographies -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-50 text-slate-800 antialiased min-h-screen">
    
    <!-- Core Application Mount Element -->
    <div id="root"></div>

    <!-- Production-grade React 18 & ReactDOM Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Flexible Browser JSX Transpiler -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Main Standalone Application Logic -->
    <script type="text/babel" src="app.js"></script>
    
  </body>
</html>
